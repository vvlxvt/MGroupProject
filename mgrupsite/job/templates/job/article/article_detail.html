{% extends "job/base.html" %}
{% load static %}


{% block articles %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card mb-4">
                <img src="{{article.photo.url}}" class="card-img-top" alt="Article Image">
                <div class="card-body">
                    <h5 class="card-title">{{ article.title }}</h5>
                    <p class="card-text article-body"> {{ article.body|safe }}.</p>
                    <div class="card-footer mb-3">
                      <small class="text-muted">Опубликовано: {{ article.publish }}</small>
                    </div>
                        <a href="{{ request.META.HTTP_REFERER|default:'#' }}"
                           class="btn-custom"
                           style="text-align: center;"
                           onclick="window.history.back(); return false;">назад</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
