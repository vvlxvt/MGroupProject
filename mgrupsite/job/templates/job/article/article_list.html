
<div class="container mt-5">
    {{ articles|length }} articles found.
        <div class="row">
            {% for article in articles %}
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    {% if post.photo %}
                        <p><img class="d-block w-100" src="{{article.photo.url}}"></p>
                    {% endif %}
                    <div class="card-body">
                        <h5 class="card-title">{{ article.title }}</h5>
                        <p class="card-text">{{ article.body|truncatewords:30 }}</p>
                        <a href="{{ article.get_absolute_url }}" class="btn btn-primary"
                           style="background-color:#035199; border-color:#035199;">Узнать больше</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
</div>
