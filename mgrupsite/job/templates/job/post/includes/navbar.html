<nav class="navbar navbar-expand-lg navbar-light">
    <a class="navbar-brand ms-3 pt-0" href="{% url 'job:home' %}">
        <svg width="0" height="0">
            <filter id="highlight">
                <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="black"/>
            </filter>
        </svg>
        <img src="/media/photos/Logo/favicon/logo_mg_less.png"alt="МалярGroup"class="logo"
             style="background:transparent;filter: url(#highlight);"></a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            {% for key, m in menu.items %}
                {% if m.submenus %}
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="{% url m.url_name %}" id="navbarDropdown"
                           role="button" aria-haspopup="true" aria-expanded="false">
                            {{ m.title }}
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown{{ key }}">
                            {% for sub in m.submenus %}
                                <li><a class="dropdown-item"
                                       href="{% url sub.url_name %}?category={{ sub.slug }}">{{ sub.title }}</a></li>
                            {% endfor %}
                        </ul>
                    </li>
                {% else %}
                    {% if key == 'search' %}
                        <li class="nav-item">
                            <form class="d-flex" method="GET" action="{% url m.url_name %}">
                                <input class="form-control me-2" type="search" name="query"
                                       placeholder="Поиск по статьям" aria-label="Search">
                                <button class="btn btn-outline-success" type="submit">
                                    <i class="fas fa-search"></i> <!-- Иконка лупы -->
                                </button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url m.url_name %}">{{ m.title }}</a>
                        </li>
                    {% endif %}
                {% endif %}
            {% endfor %}
        </ul>
    </div>
</nav>
