{% extends "job/base.html" %}
{% load static %}

{% block landing %}
<section id="lending" class="bg-white py-3">
    <div class="container">
        <div class="row g-5">
            <div class="col-lg-6 col-sm-3 mb-5">
                <p class="fs-4 text-center">Наши объекты:</p>
                <div id="carouselExampleAutoplaying" class="carousel slide my-carousel" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        {% for post in posts %}
                            <div class="carousel-item {% if forloop.first %}active{% endif %}">
                                <img src="{{ post.photo.url }}" class="d-block w-100" alt="{{ post.title }}">
                                <div class="carousel-caption d-none d-md-block">
                                    <h5>{{ post.title }}</h5>
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying"
                        data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span> <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying"
                        data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span> <span class="visually-hidden">Next</span>
                </button>
            </div>

            <div class="col-lg-6 col-sm-3 mb-5">
                <p class="fs-4 text-center">Локации наших объектов:</p>
                <iframe
                  width="600"
                  height="450"
                  style="border:0"
                  loading="lazy"
                  allowfullscreen
                  referrerpolicy="no-referrer-when-downgrade"
                  src="https://www.google.com/maps/embed/v1/place?key={{ google_maps_api_key }}&q=55.9766456,92.6856609">
                </iframe>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row g-5">
            <div class="col-lg-6 col-sm-3 mb-5">
                <p class="h4 text-center text-decoration-none">Наши услуги</p>
                <ol class="list-unstyled fs-1">
                    {% for key in facemenu %}
                        <li class="list-group-item fs-5">
                            <a href="{% url key.url_name %}?category={{ key.slug }}" class="text-decoration-none">
                            {{ forloop.counter }}. {{ key.title }}
                            </a>
                        </li>
                    {% endfor %}
                </ol>
        </div>
    </div>
</div>

</section>
{% endblock %}
